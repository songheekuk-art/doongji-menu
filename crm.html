<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>둥지 CRM — 영업팀 고객관리</title>
<!-- v2: 주간 보고 기능 추가 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; color: #1a1a1a; background: #f5f6f8; }

  /* ===== BRAND ===== */
  :root {
    --brand: #3B8CE4;
    --brand-dark: #1a6cc7;
    --brand-light: #EBF3FD;
    --brand-border: #b3d3f5;

    --surface-0: #f5f6f8;
    --surface-1: #ffffff;
    --surface-2: #fafafa;

    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;

    --border: #e5e7eb;
    --border-strong: #d1d5db;

    --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
    --amber: #d97706; --amber-bg: #fffbeb; --amber-border: #fde68a;
    --red: #dc2626;   --red-bg: #fef2f2;   --red-border: #fecaca;
    --blue: #3B8CE4;  --blue-bg: #EBF3FD;  --blue-border: #b3d3f5;

    --radius: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  /* ===== LAYOUT ===== */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* --- Sidebar --- */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-brand { font-size: 17px; font-weight: 700; color: var(--brand); letter-spacing: -0.3px; }
  .logo-sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .nav-section { padding: 12px 10px 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 14px;
    margin: 1px 6px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background .12s, color .12s;
    border: none;
    background: none;
    width: calc(100% - 12px);
    text-align: left;
  }
  .nav-item i { font-size: 17px; }
  .nav-item:hover  { background: var(--surface-0); color: var(--text-primary); }
  .nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

  /* --- Main --- */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ===== PAGES ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s;
    border: 1px solid transparent;
    line-height: 1;
  }
  .btn i { font-size: 15px; }
  .btn-primary  { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-secondary { background: var(--surface-1); color: var(--text-secondary); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--surface-0); color: var(--text-primary); }
  .btn-danger   { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ===== STATS ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .c-blue   { color: var(--brand); }
  .c-green  { color: var(--green); }
  .c-amber  { color: var(--amber); }
  .c-red    { color: var(--red); }

  /* ===== ALERT ===== */
  .alert {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 20px;
    border: 1px solid;
  }
  .alert i { font-size: 17px; flex-shrink: 0; }
  .alert-warning { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }

  /* ===== SECTION HEADER ===== */
  .section-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-hd h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

  /* ===== BUILDING CARDS ===== */
  .building-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
  .bcard {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .bcard:hover { border-color: var(--brand-border); box-shadow: var(--shadow-sm); }
  .bcard-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
  .bcard-addr { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bcard-owner { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
  .bcard-owner i { font-size: 13px; }
  .bcard-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .bcard-next { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
  .bcard-next i { font-size: 11px; }

  /* ===== BADGES ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 99px;
    border: 1px solid;
  }
  .badge-blue   { background: var(--blue-bg);  color: var(--blue);  border-color: var(--blue-border); }
  .badge-green  { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .badge-amber  { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .badge-red    { background: var(--red-bg);   color: var(--red);   border-color: var(--red-border); }
  .badge-purple { background: #faf5ff;         color: #6d28d9;      border-color: #ddd6fe; }
  .badge-red    { background: var(--red-bg);   color: var(--red);   border-color: var(--red-border); }
  .badge-gray   { background: #f3f4f6;         color: #6b7280;      border-color: #e5e7eb; }

  /* ===== TABLE ===== */
  .table-wrap { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface-0); }
  th { padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text-secondary); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface-0); }
  .td-name { font-weight: 600; color: var(--text-primary); }

  /* ===== CALENDAR ===== */
  .cal-nav-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cal-nav-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-1);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-secondary);
    transition: background .12s;
  }
  .cal-nav-btn:hover { background: var(--surface-0); }
  .cal-title { font-size: 15px; font-weight: 600; }
  .cal-legend { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }

  .cal-grid-wrap { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--surface-0); border-bottom: 1px solid var(--border); }
  .cal-dow { padding: 8px 0; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell {
    min-height: 80px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    cursor: pointer;
    transition: background .1s;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: #f9fafb; }
  .cal-cell.other { background: #fafafa; }
  .cal-cell.other .day-num { color: #ccc; }
  .day-num {
    font-size: 12px;
    font-weight: 600;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 3px;
  }
  .cal-cell.today .day-num {
    background: var(--brand);
    color: #fff;
    border-radius: 50%;
  }
  .cal-event {
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 3px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .cal-event.meet  { background: #EBF3FD; color: #1a5fa8; border-left: 2px solid #3B8CE4; }
  .cal-event.call  { background: #f0fdf4; color: #15803d; border-left: 2px solid #16a34a; }
  .cal-event.email { background: #faf5ff; color: #6d28d9; border-left: 2px solid #7c3aed; }
  .cal-event.kakao { background: #fffbeb; color: #b45309; border-left: 2px solid #d97706; }
  .cal-event.sms   { background: #fef2f2; color: #b91c1c; border-left: 2px solid #dc2626; }
  .cal-more { font-size: 10px; color: var(--text-muted); padding: 1px 2px; }

  /* ===== LOG ITEMS ===== */
  .log-feed { display: flex; flex-direction: column; gap: 0; }
  .log-item {
    display: flex;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .log-item:last-child { border-bottom: none; }
  .log-icon {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .log-icon.meet  { background: #EBF3FD; }
  .log-icon.meet  i { color: #3B8CE4; font-size: 16px; }
  .log-icon.call  { background: #f0fdf4; }
  .log-icon.call  i { color: #16a34a; font-size: 16px; }
  .log-icon.email { background: #faf5ff; }
  .log-icon.email i { color: #7c3aed; font-size: 16px; }
  .log-icon.kakao { background: #fffbeb; }
  .log-icon.kakao i { color: #d97706; font-size: 16px; }
  .log-icon.sms   { background: #fef2f2; }
  .log-icon.sms   i { color: #dc2626; font-size: 16px; }
  .log-body { flex: 1; min-width: 0; }
  .log-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
  .log-bld  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .log-date { font-size: 11px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
  .log-content { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .log-next { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 3px; }
  .log-next i { font-size: 11px; }

  /* ===== FILTER BAR ===== */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar select { padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-1); font-size: 13px; color: var(--text-secondary); cursor: pointer; }
  .filter-bar select:focus { outline: none; border-color: var(--brand); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface-1);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 24px;
    width: 500px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,.12);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; display: flex; align-items: center; padding: 2px; border-radius: 4px; }
  .modal-close:hover { color: var(--text-primary); background: var(--surface-0); }

  /* ===== FORM ===== */
  .form-row { margin-bottom: 14px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  label.f-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
  .req { color: var(--red); }
  input.f-input, select.f-input, textarea.f-input {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: #fff;
    font-size: 13px;
    color: var(--text-primary);
    font-family: inherit;
    transition: border-color .12s;
  }
  input.f-input:focus, select.f-input:focus, textarea.f-input:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(59,140,228,.1);
  }
  textarea.f-input { resize: vertical; }
  .form-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .form-section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ===== DETAIL MODAL INTERNALS ===== */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-item .di-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 3px; }
  .detail-item .di-val { font-size: 13px; color: var(--text-primary); font-weight: 500; }
  .detail-memo { background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; opacity: .5; }
  .empty p { font-size: 13px; line-height: 1.7; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  /* ===== TOOLTIP / tiny helpers ===== */
  .text-muted { color: var(--text-muted); }
  .mt-4 { margin-top: 4px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }

  /* ===== WEEKLY REPORT ===== */
  .week-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .week-selector label { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
  .week-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .week-tab {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface-1);
    color: var(--text-secondary);
    transition: all .12s;
    white-space: nowrap;
  }
  .week-tab:hover { background: var(--surface-0); color: var(--text-primary); }
  .week-tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .report-header {
    background: var(--brand);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 20px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .report-header-left h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .report-header-left p  { font-size: 13px; opacity: .8; }
  .report-header-right { display: flex; gap: 8px; }

  .parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .part-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .part-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-0);
  }
  .part-card-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .part-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .part-card-body { padding: 14px 16px; }
  .part-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .part-item:last-child { border-bottom: none; padding-bottom: 0; }
  .part-item-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--surface-0);
    border: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .part-item-text { flex: 1; color: var(--text-primary); line-height: 1.5; }
  .part-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .part-add-btn {
    width: 100%;
    padding: 8px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    background: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 10px;
    transition: all .12s;
  }
  .part-add-btn:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

  /* 보고서 인쇄/공유 뷰 */
  .report-print-wrap { display: none; }
  @media print {
    .sidebar, .topbar, .week-selector, .report-header-right, .part-add-btn, .btn-secondary, .no-print { display: none !important; }
    .app { display: block; }
    .main { overflow: visible; }
    .content { padding: 0; }
    .report-print-wrap { display: block; }
    .parts-grid { grid-template-columns: 1fr 1fr; }
  }

  /* 공유 링크 배너 */
  .share-bar {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #0369a1;
    margin-bottom: 16px;
  }
  .share-bar i { font-size: 15px; flex-shrink: 0; }
  .share-url {
    flex: 1;
    font-family: monospace;
    font-size: 11px;
    background: #fff;
    border: 1px solid #bae6fd;
    border-radius: 4px;
    padding: 4px 8px;
    color: #1e40af;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 아이템 삭제 버튼 */
  .part-item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    padding: 2px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity .12s;
    flex-shrink: 0;
  }
  .part-item:hover .part-item-del { opacity: 1; }
  .part-item-del:hover { color: var(--red); background: var(--red-bg); }

  /* ===== LOG IMPORT PANEL ===== */
  .import-panel {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .import-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #f0f9ff;
    border-bottom: 1px solid #bae6fd;
    cursor: pointer;
    user-select: none;
  }
  .import-panel-head:hover { background: #e0f2fe; }
  .import-panel-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #0369a1;
  }
  .import-panel-title i { font-size: 16px; }
  .import-panel-body { padding: 0; }
  .import-panel-body.collapsed { display: none; }

  .import-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-0);
    flex-wrap: wrap;
  }
  .import-filters label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .import-filters select,
  .import-filters input[type=date] {
    padding: 5px 8px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: #fff;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .import-log-list { max-height: 320px; overflow-y: auto; }
  .import-log-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: pointer;
  }
  .import-log-item:last-child { border-bottom: none; }
  .import-log-item:hover { background: #f0f9ff; }
  .import-log-item.selected { background: #EBF3FD; }
  .import-log-item input[type=checkbox] { margin-top: 3px; accent-color: var(--brand); flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
  .import-log-item-body { flex: 1; min-width: 0; }
  .import-log-item-row1 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
  .import-log-item-bld { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .import-log-item-date { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .import-log-item-content { font-size: 12px; color: var(--text-secondary); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .import-log-item.already { opacity: .45; cursor: default; pointer-events: none; }
  .import-log-item.already::after { content: '이미 추가됨'; font-size: 10px; color: var(--text-muted); }

  .import-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface-0);
  }
  .import-footer-info { font-size: 12px; color: var(--text-muted); }
  .import-part-assign {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .import-part-assign label { font-size: 12px; color: var(--text-secondary); }
  .import-part-assign select { padding: 5px 8px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 12px; background: #fff; }

  /* ===== BACK TO LAUNCHER ===== */
  .back-to-launcher {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; margin: 10px 6px 4px;
    border-radius: var(--radius);
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--surface-0);
    transition: all .12s;
  }
  .back-to-launcher:hover { color: var(--brand); border-color: var(--brand-border); background: var(--brand-light); }
  .back-to-launcher i { font-size: 15px; }

  /* ===== DB STATUS ===== */
  .db-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--green-border);
    background: var(--green-bg);
    color: var(--green);
    white-space: nowrap;
  }
  .db-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2.5s infinite;
  }
  @keyframes blink {
    0%,90%,100%{opacity:1} 95%{opacity:.2}
  }
  .sync-toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: #1a1a1a;
    color: #fff;
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .sync-toast.show { opacity: 1; transform: translateY(0); }
  .sync-toast i { font-size: 14px; color: #4ade80; }

  /* ===== SUPABASE PLACEHOLDER COMMENT ===== */
  /*
  ==============================================
  [TODO] Supabase 연동 시 이 파일에서 수정할 부분
  ==============================================
  1. <head> 에 supabase-js CDN 추가:
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  2. 아래 DB 설정 섹션에서 URL/KEY 입력 후 주석 해제

  3. save() 함수 → supabase.from('buildings').upsert(...) 등으로 교체
     load() 함수 → supabase.from('buildings').select('*') 등으로 교체

  4. 필요 테이블:
     buildings (id, name, addr, type, area, owner, phone, email, next_date, memo, created_at)
     contact_logs (id, building_id, type, date, staff, content, next_date, created_at)
  ==============================================
  */
</style>
</head>
<body>

<!-- ===================== APP SHELL ===================== -->
<div class="app">

  <!-- ---- SIDEBAR ---- -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-brand">🏢 둥지 CRM</div>
      <div class="logo-sub">영업팀 고객관리 시스템</div>
    </div>
    <a class="back-to-launcher" href="./index.html"><i class="ti ti-arrow-left"></i>메인 메뉴로</a>
    <div class="nav-section">메뉴</div>
    <button class="nav-item active" data-page="overview"><i class="ti ti-layout-dashboard"></i>대시보드</button>
    <button class="nav-item" data-page="buildings"><i class="ti ti-building"></i>건물 관리</button>
    <button class="nav-item" data-page="owners"><i class="ti ti-users"></i>임대인 관리</button>
    <button class="nav-item" data-page="calendar"><i class="ti ti-calendar"></i>미팅 캘린더</button>
    <button class="nav-item" data-page="logs"><i class="ti ti-clipboard-list"></i>소통 기록</button>
    <div class="nav-section" style="margin-top:8px">보고</div>
    <button class="nav-item" data-page="weekly"><i class="ti ti-file-report"></i>주간 미팅 보고</button>
  </nav>

  <!-- ---- MAIN ---- -->
  <div class="main">

    <!-- topbar -->
    <div class="topbar">
      <span class="topbar-title" id="page-title">대시보드</span>
      <div class="topbar-actions" id="topbar-actions">
        <div class="db-status"><span class="db-dot"></span>로컬 저장 중</div>
        <button class="btn btn-secondary" id="btn-log" onclick="openLogModal()" style="display:none"><i class="ti ti-phone"></i>기록 추가</button>
        <button class="btn btn-secondary" id="btn-share-report" onclick="copyReportLink()" style="display:none"><i class="ti ti-link"></i>링크 복사</button>
        <button class="btn btn-secondary" id="btn-print-report" onclick="window.print()" style="display:none"><i class="ti ti-printer"></i>인쇄</button>
        <button class="btn btn-primary" id="btn-add-report-item" onclick="openReportItemModal()" style="display:none"><i class="ti ti-plus"></i>항목 추가</button>
        <button class="btn btn-primary" id="btn-building" onclick="openBuildingModal()"><i class="ti ti-plus"></i>건물 추가</button>
      </div>
    </div>

    <!-- content -->
    <div class="content">

      <!-- ===== 대시보드 ===== -->
      <div class="page active" id="page-overview">
        <div class="stats-grid" id="stats-grid"></div>
        <div id="alert-zone"></div>
        <div class="section-hd"><h2>최근 소통 기록</h2></div>
        <div class="table-wrap">
          <div class="log-feed" id="recent-log-feed" style="padding: 0 16px;"></div>
        </div>
      </div>

      <!-- ===== 건물 관리 ===== -->
      <div class="page" id="page-buildings">
        <div class="building-grid" id="building-grid"></div>
      </div>

      <!-- ===== 임대인 관리 ===== -->
      <div class="page" id="page-owners">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>임대인</th>
                <th>건물명</th>
                <th>연락처</th>
                <th>이메일</th>
                <th>마지막 대면·유선</th>
                <th>다음 예정일</th>
                <th>상태</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="owner-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== 캘린더 ===== -->
      <div class="page" id="page-calendar">
        <div class="cal-nav-bar">
          <button class="cal-nav-btn" id="prev-month"><i class="ti ti-chevron-left"></i></button>
          <span class="cal-title" id="cal-label"></span>
          <button class="cal-nav-btn" id="next-month"><i class="ti ti-chevron-right"></i></button>
          <div class="cal-legend">
            <span><span class="cal-legend-dot" style="background:#EBF3FD;border:1.5px solid #3B8CE4;"></span>대면</span>
            <span><span class="cal-legend-dot" style="background:#f0fdf4;border:1.5px solid #16a34a;"></span>유선</span>
            <span><span class="cal-legend-dot" style="background:#faf5ff;border:1.5px solid #7c3aed;"></span>이메일</span>
            <span><span class="cal-legend-dot" style="background:#fffbeb;border:1.5px solid #d97706;"></span>카톡</span>
            <span><span class="cal-legend-dot" style="background:#fef2f2;border:1.5px solid #dc2626;"></span>문자</span>
          </div>
        </div>
        <div class="cal-grid-wrap">
          <div class="cal-dow-row">
            <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
            <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
          </div>
          <div class="cal-days" id="cal-days"></div>
        </div>
      </div>

      <!-- ===== 소통 기록 ===== -->
      <div class="page" id="page-logs">
        <div class="filter-bar">
          <select id="filter-type" onchange="renderLogPage()">
            <option value="">전체 유형</option>
            <option value="meet">대면 미팅</option>
            <option value="call">유선 통화</option>
            <option value="email">이메일</option>
            <option value="kakao">카카오톡</option>
            <option value="sms">문자</option>
          </select>
          <select id="filter-bld" onchange="renderLogPage()">
            <option value="">전체 건물</option>
          </select>
          <select id="filter-month" onchange="renderLogPage()">
            <option value="">전체 기간</option>
          </select>
        </div>
        <div class="table-wrap">
          <div class="log-feed" id="log-feed" style="padding: 0 16px;"></div>
        </div>
      </div>

      <!-- ===== 주간 미팅 보고 ===== -->
      <div class="page" id="page-weekly">

        <!-- 주차 선택 -->
        <div class="week-selector">
          <label><i class="ti ti-calendar-week" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>보고 주차</label>
          <div class="week-tabs" id="week-tabs"></div>
          <input type="date" class="f-input" id="week-date-pick" style="width:150px;padding:6px 10px;font-size:12px" title="날짜 직접 선택">
          <button class="btn btn-secondary btn-sm" onclick="addWeekFromDate()"><i class="ti ti-plus"></i>주차 추가</button>
        </div>

        <!-- 공유 링크 배너 -->
        <div class="share-bar" id="share-bar" style="display:none">
          <i class="ti ti-link"></i>
          <span>이 주간 보고 전용 링크:</span>
          <span class="share-url" id="share-url-text"></span>
          <button class="btn btn-secondary btn-sm" onclick="copyReportLink()"><i class="ti ti-copy"></i>복사</button>
        </div>

        <!-- 소통 기록 불러오기 패널 -->
        <div class="import-panel no-print" id="import-panel" style="display:none">
          <div class="import-panel-head" onclick="toggleImportPanel()">
            <div class="import-panel-title">
              <i class="ti ti-database-import"></i>
              소통 기록에서 불러오기
              <span class="badge badge-blue" id="import-week-label" style="font-weight:400"></span>
            </div>
            <i class="ti ti-chevron-up" id="import-chevron" style="font-size:16px;color:#0369a1"></i>
          </div>
          <div class="import-panel-body" id="import-panel-body">
            <div class="import-filters">
              <label>기간</label>
              <select id="imp-range" onchange="renderImportList()">
                <option value="week">이번 주</option>
                <option value="2week">최근 2주</option>
                <option value="month">최근 1개월</option>
                <option value="custom">직접 설정</option>
              </select>
              <span id="imp-custom-dates" style="display:none;gap:6px;align-items:center;display:none">
                <input type="date" id="imp-from" onchange="renderImportList()">
                <span style="color:var(--text-muted)">~</span>
                <input type="date" id="imp-to" onchange="renderImportList()">
              </span>
              <label style="margin-left:8px">유형</label>
              <select id="imp-type" onchange="renderImportList()">
                <option value="">전체</option>
                <option value="meet">대면 미팅</option>
                <option value="call">유선 통화</option>
                <option value="email">이메일</option>
                <option value="kakao">카카오톡</option>
                <option value="sms">문자</option>

              <label style="margin-left:8px">건물</label>
              <select id="imp-bld" onchange="renderImportList()">
                <option value="">전체</option>
              </select>
              <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="toggleSelectAll()">전체 선택</button>
            </div>
            <div class="import-log-list" id="import-log-list"></div>
            <div class="import-footer">
              <span class="import-footer-info" id="import-selected-info">선택된 항목 없음</span>
              <div class="import-part-assign">
                <label>파트 지정</label>
                <select id="imp-part"></select>
                <button class="btn btn-primary btn-sm" onclick="importSelectedLogs()">
                  <i class="ti ti-download"></i> 보고서에 추가
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 보고서 본문 -->
        <div id="weekly-report-body"></div>

      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->


<!-- ===================== MODAL: 건물 추가/편집 ===================== -->
<div class="modal-overlay" id="modal-building">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="building-modal-title">건물 추가</span>
      <button class="modal-close" onclick="closeModal('modal-building')"><i class="ti ti-x"></i></button>
    </div>

    <div class="form-section-label">건물 정보</div>
    <div class="form-row">
      <label class="f-label">건물명 <span class="req">*</span></label>
      <input class="f-input" id="b-name" placeholder="예: 강남 스타빌딩">
    </div>
    <div class="form-row">
      <label class="f-label">주소 <span class="req">*</span></label>
      <input class="f-input" id="b-addr" placeholder="서울시 강남구 테헤란로 123">
    </div>
    <div class="form-row-3">
      <div>
        <label class="f-label">건물 용도</label>
        <select class="f-input" id="b-type">
          <option>오피스</option><option>상가</option><option>주거</option>
          <option>복합</option><option>물류</option><option>기타</option>
        </select>
      </div>
      <div>
        <label class="f-label">연면적 (평)</label>
        <input class="f-input" id="b-area" type="number" placeholder="500">
      </div>
      <div>
        <label class="f-label">층수</label>
        <input class="f-input" id="b-floors" placeholder="B2/10F">
      </div>
    </div>

    <hr class="form-divider">
    <div class="form-section-label">임대인 정보</div>
    <div class="form-row">
      <label class="f-label">임대인 이름 <span class="req">*</span></label>
      <input class="f-input" id="b-owner" placeholder="홍길동">
    </div>
    <div class="form-row-2">
      <div>
        <label class="f-label">연락처</label>
        <input class="f-input" id="b-phone" placeholder="010-0000-0000">
      </div>
      <div>
        <label class="f-label">이메일</label>
        <input class="f-input" id="b-email" placeholder="owner@email.com">
      </div>
    </div>

    <hr class="form-divider">
    <div class="form-section-label">일정</div>
    <div class="form-row-2">
      <div>
        <label class="f-label">계약 시작일</label>
        <input class="f-input" id="b-contract-start" type="date">
      </div>
      <div>
        <label class="f-label">다음 미팅 예정일</label>
        <input class="f-input" id="b-next" type="date">
      </div>
    </div>
    <div class="form-row">
      <label class="f-label">메모</label>
      <textarea class="f-input" id="b-memo" rows="3" placeholder="계약 조건, 특이사항 등 자유롭게 기록하세요"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-building')">취소</button>
      <button class="btn btn-primary" onclick="saveBuilding()"><i class="ti ti-check"></i>저장</button>
    </div>
  </div>
</div>


<!-- ===================== MODAL: 소통 기록 추가 ===================== -->
<div class="modal-overlay" id="modal-log">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">소통 기록 추가</span>
      <button class="modal-close" onclick="closeModal('modal-log')"><i class="ti ti-x"></i></button>
    </div>

    <div class="form-row">
      <label class="f-label">건물 <span class="req">*</span></label>
      <select class="f-input" id="l-bld"></select>
    </div>
    <div class="form-row-2">
      <div>
        <label class="f-label">소통 유형 <span class="req">*</span></label>
        <select class="f-input" id="l-type">
          <option value="meet">① 대면 미팅</option>
          <option value="call">② 유선 통화</option>
          <option value="email">③ 이메일</option>
          <option value="kakao">④ 카카오톡</option>
          <option value="sms">⑤ 문자</option>
        </select>
      </div>
      <div>
        <label class="f-label">일자 <span class="req">*</span></label>
        <input class="f-input" id="l-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <label class="f-label">담당자</label>
      <input class="f-input" id="l-staff" placeholder="소통 진행 담당자 이름">
    </div>

/* ── 전체 데이터 로드 ── */
async function persistLoad() {
  setStatus('syncing');
  const loaded = await loadSbScript();
  if (!loaded || !sb) { setStatus('error'); showToast('DB 연결 실패 — 로컬 사용', false); _localLoad(); return; }
  try {
    const [b,l,p,it,w] = await Promise.all([
      sb.from('buildings').select('*').order('created_at'),
      sb.from('contact_logs').select('*').order('date',{ascending:false}),
      sb.from('weekly_parts').select('*').order('sort_order'),
      sb.from('weekly_items').select('*').order('created_at'),
      sb.from('weekly_weeks').select('*').order('week_key',{ascending:false}),
    ]);
    if (b.error) throw b.error;
    buildings   = (b.data||[]).map(toB);
    logs        = (l.data||[]).map(toL);
    weeklyParts = (p.data||[]).map(toP);
    weeklyItems = (it.data||[]).map(toI);
    weeklyWeeks = (w.data||[]).map(r=>r.week_key);
    setStatus('ok');
  } catch(e) { setStatus('error'); showToast('로드 실패: '+e.message,false); _localLoad(); }
}

/* ── 저장/수정/삭제 공통 ── */
async function _sbOp(fn) {
  if (!sb) { showToast('DB 없음',false); return null; }
  setStatus('syncing');
  try {
    const res = await fn();
    if (res?.error) throw res.error;
    await persistLoad();
    return res?.data?.[0] || true;
  } catch(e) { setStatus('error'); showToast('저장 실패: '+e.message,false); throw e; }
}

/* ============================================================
   HELPERS
   ============================================================ */
const todayStr = () => new Date().toISOString().split('T')[0];

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

// 유형별 기한 설정 (일 단위) — 대면: 90일(3개월), 유선: 60일(2개월), 나머지: 기한 없음
const TYPE_DEADLINE = { meet: 90, call: 60 };

// 건물의 "기한 관리 대상" 소통(대면+유선)만 기준으로 상태 판단
function buildingStatus(b) {
  const targetLogs = logs
    .filter(l => l.bldId === b.id && (l.type === 'meet' || l.type === 'call'))
    .sort((a, c) => c.date.localeCompare(a.date));

  if (!targetLogs.length) return 'new';

  // 가장 최근 대면 / 가장 최근 유선을 각각 체크
  const lastMeet = logs.filter(l => l.bldId === b.id && l.type === 'meet').sort((a,c) => c.date.localeCompare(a.date))[0];
  const lastCall = logs.filter(l => l.bldId === b.id && l.type === 'call').sort((a,c) => c.date.localeCompare(a.date))[0];

  const meetDiff = lastMeet ? daysBetween(lastMeet.date, todayStr()) : Infinity;
  const callDiff = lastCall ? daysBetween(lastCall.date, todayStr()) : Infinity;

  // 대면 기한(90일) 초과 OR 유선 기한(60일) 초과
  if (meetDiff > 90 || callDiff > 60) return 'overdue';
  // 대면 75일 이상 OR 유선 45일 이상 → 곧 필요
  if (meetDiff > 75 || callDiff > 45) return 'soon';
  return 'ok';
}

// 건물 상태 상세 툴팁용 텍스트
function buildingStatusDetail(b) {
  const lastMeet = logs.filter(l => l.bldId === b.id && l.type === 'meet').sort((a,c) => c.date.localeCompare(a.date))[0];
  const lastCall = logs.filter(l => l.bldId === b.id && l.type === 'call').sort((a,c) => c.date.localeCompare(a.date))[0];
  const parts = [];
  if (lastMeet) parts.push(`대면: ${daysBetween(lastMeet.date, todayStr())}일 전 (기한 90일)`);
  else parts.push('대면: 기록 없음 (기한 90일)');
  if (lastCall) parts.push(`유선: ${daysBetween(lastCall.date, todayStr())}일 전 (기한 60일)`);
  else parts.push('유선: 기록 없음 (기한 60일)');
  return parts.join(' · ');
}

function lastContactDate(b) {
  const bLogs = logs.filter(l => l.bldId === b.id).sort((a, c) => c.date.localeCompare(a.date));
  return bLogs.length ? bLogs[0].date : null;
}

/* -- 캘린더 -- */
let calYear, calMonth;

function renderCalendar() {
  const label = document.getElementById('cal-label');
  label.textContent = `${calYear}년 ${calMonth + 1}월`;

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const lastDay  = new Date(calYear, calMonth + 1, 0).getDate();
  const tStr     = todayStr();

  let html = '';

  // prev month cells
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDow - 1; i >= 0; i--) {
    html += `<div class="cal-cell other"><div class="day-num">${prevLast - i}</div></div>`;
  }

  for (let d = 1; d <= lastDay; d++) {
    const ds = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const dayLogs = logs.filter(l => l.date === ds);
    const isToday = ds === tStr;

    const events = dayLogs.slice(0, 3).map(l => {
      const bname = bName(l.bldId);
      return `<div class="cal-event ${l.type}" title="${bname}">${bname.slice(0, 7)}</div>`;
    }).join('');
    const more = dayLogs.length > 3 ? `<div class="cal-more">+${dayLogs.length - 3}건</div>` : '';

    html += `
      <div class="cal-cell${isToday ? ' today' : ''}">
        <div class="day-num">${d}</div>
        ${events}${more}
      </div>
    `;
  }

  // next month cells
  const total = firstDow + lastDay;
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remainder; i++) {
    html += `<div class="cal-cell other"><div class="day-num">${i}</div></div>`;
  }

  document.getElementById('cal-days').innerHTML = html;
}

// 날짜 → 해당 주 월요일 반환 (YYYY-MM-DD)
function getMondayOf(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=일, 1=월
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

// 월요일 날짜 → 표시 라벨 (예: 7/7(월))
function weekLabel(mondayStr) {
  const d = new Date(mondayStr + 'T00:00:00');
  const m = d.getMonth() + 1;
  const dd = d.getDate();
  return `${m}/${dd}(월)`;
}

// 주차 날짜 범위 텍스트 (월요일 ~ 일요일)
function weekRangeText(mondayStr) {
  const mon = new Date(mondayStr + 'T00:00:00');
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}월 ${d.getDate()}일`;
  return `${fmt(mon)} ~ ${fmt(sun)}`;
}

let currentWeekKey = null; // 현재 보고 있는 주차 (월요일 날짜)

async function addWeekFromDate() {
  const val = document.getElementById('week-date-pick').value;

    try { await _sbOp(() => sb.from('weekly_weeks').insert({week_key: monday})); } catch(e) {}
  }
  currentWeekKey = monday;

  renderWeekly();
}

                `;
              }).join('') : `<div style="color:var(--text-muted);font-size:12px;padding:8px 0;text-align:center">아직 항목이 없습니다.</div>`}
              <button class="part-add-btn no-print" onclick="openReportItemModal(${p.id})">
                <i class="ti ti-plus"></i> 항목 추가
              </button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* ============================================================
   IMPORT FROM LOGS
   ============================================================ */

let importPanelOpen = true;

function showImportPanel() {
  const panel = document.getElementById('import-panel');
  panel.style.display = '';
  importPanelOpen = true;
  document.getElementById('import-chevron').className = 'ti ti-chevron-up';
  document.getElementById('import-panel-body').classList.remove('collapsed');

  // 기간 기본값: 해당 주 월~일
  document.getElementById('imp-range').value = 'week';
  document.getElementById('imp-from').value = currentWeekKey || todayStr();
  const sunDate = new Date((currentWeekKey || todayStr()) + 'T00:00:00');
  sunDate.setDate(sunDate.getDate() + 6);
  document.getElementById('imp-to').value = sunDate.toISOString().split('T')[0];

  // 주차 라벨
  document.getElementById('import-week-label').textContent =
    currentWeekKey ? weekRangeText(currentWeekKey) : '';

  // 건물 필터 옵션
  document.getElementById('imp-bld').innerHTML =
    '<option value="">전체</option>' +
    buildings.map(b => `<option value="${b.id}">${b.name}</option>`).join('');

  // 파트 선택
  document.getElementById('imp-part').innerHTML =
    weeklyParts.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  renderImportList();
  // 스크롤해서 패널 보이게
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleImportPanel() {
  importPanelOpen = !importPanelOpen;
  document.getElementById('import-panel-body').classList.toggle('collapsed', !importPanelOpen);
  document.getElementById('import-chevron').className =
    importPanelOpen ? 'ti ti-chevron-up' : 'ti ti-chevron-down';
}

// 날짜 범위 계산
function getImportDateRange() {
  const range = document.getElementById('imp-range').value;
  const today = todayStr();
  let from, to;

  if (range === 'week') {
    // 선택된 주의 월~일
    from = currentWeekKey || getMondayOf(today);
    const sun = new Date(from + 'T00:00:00'); sun.setDate(sun.getDate() + 6);
    to = sun.toISOString().split('T')[0];
  } else if (range === '2week') {
    const mon = new Date((currentWeekKey || getMondayOf(today)) + 'T00:00:00');
    mon.setDate(mon.getDate() - 7);
    from = mon.toISOString().split('T')[0];
    const sun = new Date((currentWeekKey || getMondayOf(today)) + 'T00:00:00');
    sun.setDate(sun.getDate() + 6);
    to = sun.toISOString().split('T')[0];
  } else if (range === 'month') {
    const d = new Date(today); d.setDate(d.getDate() - 30);
    from = d.toISOString().split('T')[0];
    to = today;
  } else {
    from = document.getElementById('imp-from').value || today;
    to   = document.getElementById('imp-to').value   || today;
  }
  return { from, to };
}

// 이미 이번 주 보고서에 추가된 log ID 집합
function alreadyImportedIds() {
  return new Set(
    weeklyItems
      .filter(i => i.weekKey === currentWeekKey && i.sourceLogId)
      .map(i => i.sourceLogId)
  );
}

let selectedLogIds = new Set();

function renderImportList() {
  const rangeEl = document.getElementById('imp-range');
  const customDates = document.getElementById('imp-custom-dates');
  if (rangeEl.value === 'custom') {
    customDates.style.display = 'flex';
  } else {
    customDates.style.display = 'none';
  }

  const { from, to } = getImportDateRange();
  const typeF = document.getElementById('imp-type').value;
  const bldF  = document.getElementById('imp-bld').value;
  const already = alreadyImportedIds();

  let filtered = logs
    .filter(l => l.date >= from && l.date <= to)
    .filter(l => !typeF || l.type === typeF)
    .filter(l => !bldF  || l.bldId === parseInt(bldF))
    .sort((a, b) => b.date.localeCompare(a.date));

  const el = document.getElementById('import-log-list');

  if (!filtered.length) {
    el.innerHTML = `<div class="empty" style="padding:24px"><i class="ti ti-inbox"></i><p>해당 기간에 소통 기록이 없습니다.</p></div>`;
    updateImportInfo();
    return;
  }

  el.innerHTML = filtered.map(l => {
    const b = buildings.find(x => x.id === l.bldId);
    const isAlready = already.has(l.id);
    const isSelected = selectedLogIds.has(l.id);
    const meta = TYPE_META[l.type] || TYPE_META.call;
    return `
      <label class="import-log-item${isAlready ? ' already' : ''}${isSelected ? ' selected' : ''}" for="imp-chk-${l.id}">
        <input type="checkbox" id="imp-chk-${l.id}"
          ${isAlready ? 'disabled checked' : ''}
          ${isSelected && !isAlready ? 'checked' : ''}
          onchange="toggleImportSelect(${l.id}, this.checked)">
        <div class="import-log-item-body">
          <div class="import-log-item-row1">
            <span class="import-log-item-bld">${b ? b.name : '(삭제됨)'}</span>
            <span class="badge ${meta.badge}"><i class="ti ${meta.icon}" style="font-size:10px"></i>${meta.label}</span>
            <span class="import-log-item-date">${l.date}${l.staff ? ' · ' + l.staff : ''}</span>
          </div>
          <div class="import-log-item-content">${l.content || '(내용 없음)'}</div>
        </div>
        ${isAlready ? '<span class="badge badge-gray" style="flex-shrink:0;white-space:nowrap">이미 추가됨</span>' : ''}
      </label>
    `;
  }).join('');

  updateImportInfo();
}

function toggleImportSelect(id, checked) {
  if (checked) selectedLogIds.add(id);
  else selectedLogIds.delete(id);
  // 행 selected 클래스 갱신
  const row = document.querySelector(`label[for="imp-chk-${id}"]`);
  if (row) row.classList.toggle('selected', checked);
  updateImportInfo();
}

function toggleSelectAll() {
  const checkboxes = document.querySelectorAll('#import-log-list input[type=checkbox]:not(:disabled)');
  const allChecked = [...checkboxes].every(c => c.checked);
  checkboxes.forEach(c => {
    c.checked = !allChecked;
    const id = parseInt(c.id.replace('imp-chk-', ''));
    const row = document.querySelector(`label[for="imp-chk-${id}"]`);
    if (!allChecked) { selectedLogIds.add(id); if (row) row.classList.add('selected'); }
    else            { selectedLogIds.delete(id); if (row) row.classList.remove('selected'); }
  });
  updateImportInfo();
}

function updateImportInfo() {
  const cnt = selectedLogIds.size;
  document.getElementById('import-selected-info').textContent =
    cnt ? `${cnt}개 선택됨` : '선택된 항목 없음';
}

async function importSelectedLogs() {
  if (!selectedLogIds.size) { alert('불러올 소통 기록을 선택하세요.'); return; }
  const partId = parseInt(document.getElementById('imp-part').value);
  if (!partId) { alert('파트를 선택하세요.'); return; }

  let added = 0;
  const rows = [];
  const already = alreadyImportedIds();

  selectedLogIds.forEach(logId => {
    if (already.has(logId)) return;
    const l = logs.find(x => x.id === logId);
    if (!l) return;
    const b = buildings.find(x => x.id === l.bldId);
    const meta = TYPE_META[l.type] || TYPE_META.call;

    // 내용: "[유형] 건물명 — 원본 내용" 형식으로 자동 구성
    const autoContent = [
      `[${meta.label}]`,
      b ? b.name : '',
      l.content ? '— ' + l.content : '',
    ].filter(Boolean).join(' ');

      rows.push(fromI({weekKey:currentWeekKey, partId, content:autoContent, person:l.staff||'', status:'normal', bldId:l.bldId||null, sourceLogId:logId}));
    added++;
  });

  if (!added) { alert('선택한 항목이 이미 모두 추가되어 있습니다.'); return; }

  try {
    await _sbOp(() => sb.from('weekly_items').insert(rows));
    showToast(added+'개 항목 추가 완료');
    selectedLogIds.clear();
    document.getElementById('import-panel').style.display = 'none';
    renderWeekly();
  } catch(e) {}
}

/* ============================================================
   RENDER ALL
   ============================================================ */
function renderAll() {
  renderOverview();
  renderBuildings();
  renderOwners();
  renderCalendar();
  updateFilterOptions();
  renderLogPage();
  renderWeekly();
}

/* ============================================================
   NAV
   ============================================================ */
const PAGE_CONFIG = {
  overview:  { title: '대시보드',    showBuildingBtn: true,  showLogBtn: false, showReportBtns: false },
  buildings: { title: '건물 관리',   showBuildingBtn: true,  showLogBtn: false, showReportBtns: false },
  owners:    { title: '임대인 관리', showBuildingBtn: false, showLogBtn: false, showReportBtns: false },
  calendar:  { title: '미팅 캘린더', showBuildingBtn: false, showLogBtn: true,  showReportBtns: false },
  logs:      { title: '소통 기록',   showBuildingBtn: false, showLogBtn: true,  showReportBtns: false },
  weekly:    { title: '주간 미팅 보고', showBuildingBtn: false, showLogBtn: false, showReportBtns: true },
};

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const pg = item.dataset.page;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('page-' + pg).classList.add('active');

    const cfg = PAGE_CONFIG[pg] || {};
    document.getElementById('page-title').textContent = cfg.title || '';
    document.getElementById('btn-building').style.display      = cfg.showBuildingBtn ? '' : 'none';
    document.getElementById('btn-log').style.display           = cfg.showLogBtn      ? '' : 'none';
    document.getElementById('btn-share-report').style.display  = cfg.showReportBtns  ? '' : 'none';
    document.getElementById('btn-print-report').style.display  = cfg.showReportBtns  ? '' : 'none';
    document.getElementById('btn-add-report-item').style.display = cfg.showReportBtns ? '' : 'none';
    if (pg === 'weekly') renderWeekly();
    if (pg !== 'weekly') history.replaceState(null, '', location.pathname);
  });
});

/* ============================================================
   CALENDAR NAV
   ============================================================ */
document.getElementById('prev-month').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

/* ============================================================
   INIT
   ============================================================ */
(async function init() {
  const now = new Date();
  calYear   = now.getFullYear();
  calMonth  = now.getMonth();
  await persistLoad();

  // URL 해시 라우팅 — #weekly/YYYY-MM-DD 형식으로 직접 접근 지원
  const hash = location.hash; // 예: #weekly/2025-07-07
  if (hash.startsWith('#weekly')) {
    const parts = hash.split('/');
    if (parts[1] && /^\d{4}-\d{2}-\d{2}$/.test(parts[1])) {
      const monday = getMondayOf(parts[1]);
      currentWeekKey = monday;
      // 해당 주차가 목록에 없으면 자동 추가
      if (!weeklyWeeks.includes(monday)) {
        try {
          await _sbOp(() => sb.from('weekly_weeks').insert({week_key: monday}));
        } catch(e) {}
      }
    }
    // weekly 페이지로 이동
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const weekNav = document.querySelector('.nav-item[data-page="weekly"]');
    if (weekNav) weekNav.classList.add('active');
    document.getElementById('page-weekly').classList.add('active');
    document.getElementById('page-title').textContent = '주간 미팅 보고';
    document.getElementById('btn-building').style.display        = 'none';
    document.getElementById('btn-log').style.display             = 'none';
    document.getElementById('btn-share-report').style.display    = '';
    document.getElementById('btn-print-report').style.display    = '';
    document.getElementById('btn-add-report-item').style.display = '';
  }

  renderAll();
})();
</script>
