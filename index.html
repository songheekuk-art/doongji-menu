<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>둥지 · 서비스 메뉴판</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root{
  --brand:#3B8CE4; --brand-deep:#2563A8; --brand-ink:#16324f;
  --bg:#F0F3F8; --surface:#ffffff; --surface-2:#f7f9fc;
  --ink:#16233a; --ink-2:#56657c; --ink-3:#8a98ad;
  --line:#e3e9f1;
  --fm:#3B8CE4; --fm-bg:#EBF3FD;
  --ad:#E67E22; --ad-bg:#FEF5E7;
  --hr:#EC4899; --hr-bg:#FDF2F8;
  --lm:#10B981; --lm-bg:#ECFDF5;
  --pm:#8B5CF6; --pm-bg:#F3F0FF;
  --shadow:0 1px 3px rgba(22,50,79,.06);
  --shadow-hover:0 4px 16px rgba(22,50,79,.1);
  --radius:14px; --radius-sm:10px;
  --font:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ── Header ── */
.header{
  background:linear-gradient(135deg, var(--brand-ink) 0%, var(--brand-deep) 40%, var(--brand) 100%);
  color:#fff; padding:28px 24px 24px;
}
.header-inner{max-width:960px;margin:0 auto}
.header-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.header-mark{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,.15);
  display:grid;place-items:center;
  font-size:17px;font-weight:800;letter-spacing:-1px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}
.header-label{font-size:12px;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.header h1{font-size:24px;font-weight:700;margin:4px 0 2px;line-height:1.3}
.header p{font-size:14px;opacity:.8;font-weight:400}

/* ── Tabs ── */
.tabs-wrap{max-width:960px;margin:0 auto;padding:16px 16px 8px}
.tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;
  white-space:nowrap;transition:all .2s;
  background:var(--surface);color:var(--ink-2);
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.tab:hover{color:var(--ink)}
.tab.active{color:#fff;font-weight:600}
.tab.active[data-cat="ALL"]{background:#475569}
.tab.active[data-cat="FM"]{background:var(--fm);box-shadow:0 2px 8px rgba(59,140,228,.3)}
.tab.active[data-cat="AD"]{background:var(--ad);box-shadow:0 2px 8px rgba(230,126,34,.3)}
.tab.active[data-cat="HR"]{background:var(--hr);box-shadow:0 2px 8px rgba(236,72,153,.3)}
.tab.active[data-cat="LM"]{background:var(--lm);box-shadow:0 2px 8px rgba(16,185,129,.3)}
.tab.active[data-cat="PM"]{background:var(--pm);box-shadow:0 2px 8px rgba(139,92,246,.3)}

/* ── Category Section ── */
.cat-section{margin-bottom:28px}
.cat-header{display:flex;align-items:center;gap:8px;padding:0 4px;margin-bottom:12px}
.cat-bar{width:4px;height:20px;border-radius:2px}
.cat-bar[data-c="FM"]{background:var(--fm)}
.cat-bar[data-c="AD"]{background:var(--ad)}
.cat-bar[data-c="HR"]{background:var(--hr)}
.cat-bar[data-c="LM"]{background:var(--lm)}
.cat-bar[data-c="PM"]{background:var(--pm)}
.cat-title{font-size:16px;font-weight:700;color:var(--ink)}
.cat-desc{font-size:12px;color:var(--ink-3)}

/* ── Service Grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:12px;
}
.card{
  padding:18px;background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  cursor:pointer;transition:all .2s ease;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.card:hover[data-c="FM"]{border-color:rgba(59,140,228,.35)}
.card:hover[data-c="AD"]{border-color:rgba(230,126,34,.35)}
.card:hover[data-c="HR"]{border-color:rgba(236,72,153,.35)}
.card:hover[data-c="LM"]{border-color:rgba(16,185,129,.35)}
.card:hover[data-c="PM"]{border-color:rgba(139,92,246,.35)}
.card-top{display:flex;align-items:center;justify-content:space-between}
.card-left{display:flex;align-items:center;gap:12px}
.card-icon{
  width:42px;height:42px;border-radius:12px;
  display:grid;place-items:center;font-size:20px;flex:none;
}
.card-icon[data-c="FM"]{background:var(--fm-bg)}
.card-icon[data-c="AD"]{background:var(--ad-bg)}
.card-icon[data-c="HR"]{background:var(--hr-bg)}
.card-icon[data-c="LM"]{background:var(--lm-bg)}
.card-icon[data-c="PM"]{background:var(--pm-bg)}
.card-name{font-size:15px;font-weight:700;color:var(--ink)}
.card-sub{font-size:12px;color:var(--ink-3);margin-top:1px}
.card-arrow{font-size:16px;opacity:.3;transition:opacity .2s}
.card-arrow[data-c="FM"]{color:var(--fm)}
.card-arrow[data-c="AD"]{color:var(--ad)}
.card-arrow[data-c="HR"]{color:var(--hr)}
.card-arrow[data-c="LM"]{color:var(--lm)}
.card-arrow[data-c="PM"]{color:var(--pm)}
.card:hover .card-arrow{opacity:1}
.card-desc{margin-top:10px;font-size:12.5px;color:var(--ink-2);line-height:1.5}

/* ── Modal Overlay ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.4);
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:600px;max-height:85vh;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  overflow-y:auto;
  transform:translateY(100%);transition:transform .3s ease;
}
.overlay.open .modal{transform:translateY(0)}

/* ── Modal Content ── */
.modal-head{
  padding:24px 24px 16px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--surface);
  border-radius:20px 20px 0 0;z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
}
.modal-badge{
  display:inline-block;padding:3px 10px;border-radius:12px;
  font-size:11px;font-weight:600;margin-bottom:6px;
}
.modal-badge[data-c="FM"]{background:var(--fm-bg);color:var(--fm)}
.modal-badge[data-c="AD"]{background:var(--ad-bg);color:var(--ad)}
.modal-badge[data-c="HR"]{background:var(--hr-bg);color:var(--hr)}
.modal-badge[data-c="LM"]{background:var(--lm-bg);color:var(--lm)}
.modal-badge[data-c="PM"]{background:var(--pm-bg);color:var(--pm)}
.modal-title{font-size:21px;font-weight:700;color:var(--ink);margin:4px 0 2px}
.modal-desc{font-size:14px;color:var(--ink-2);line-height:1.5}
.modal-close{
  width:32px;height:32px;border-radius:16px;
  background:#F1F5F9;display:grid;place-items:center;
  font-size:15px;color:var(--ink-2);flex:none;
  transition:background .15s;
}
.modal-close:hover{background:#E2E8F0}

.modal-body{padding:16px 24px 32px}
.detail-section{
  margin-bottom:14px;padding:16px;
  background:var(--surface-2);border-radius:12px;
}
.detail-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.detail-num{
  width:24px;height:24px;border-radius:6px;
  color:#fff;font-size:12px;font-weight:700;
  display:grid;place-items:center;flex:none;
}
.detail-num[data-c="FM"]{background:var(--fm)}
.detail-num[data-c="AD"]{background:var(--ad)}
.detail-num[data-c="HR"]{background:var(--hr)}
.detail-num[data-c="LM"]{background:var(--lm)}
.detail-num[data-c="PM"]{background:var(--pm)}
.detail-heading{font-size:15px;font-weight:700;color:var(--ink)}
.detail-item{
  display:flex;align-items:flex-start;gap:8px;
  font-size:13.5px;color:var(--ink-2);line-height:1.5;
  margin-bottom:4px;
}
.dot{margin-top:3px;flex:none;font-size:10px}
.dot[data-c="FM"]{color:var(--fm)}
.dot[data-c="AD"]{color:var(--ad)}
.dot[data-c="HR"]{color:var(--hr)}
.dot[data-c="LM"]{color:var(--lm)}
.dot[data-c="PM"]{color:var(--pm)}

.price-placeholder{
  margin-top:8px;padding:16px;
  background:linear-gradient(135deg,#F0F7FF,#EBF3FD);
  border-radius:12px;border:1px dashed #93C5FD;
  text-align:center;
}
.price-placeholder p{font-size:13px;color:#3B82F6;font-weight:500}
.price-placeholder .sub{font-size:12px;color:#93C5FD;margin-top:3px;font-weight:400}

/* ── Footer ── */
.footer{text-align:center;padding:20px 16px 32px;font-size:12px;color:var(--ink-3)}
.footer .co{font-weight:600;color:var(--ink-2);margin-bottom:3px}

/* ── Responsive ── */
@media(max-width:480px){
  .header{padding:22px 18px 20px}
  .header h1{font-size:21px}
  .grid{grid-template-columns:1fr;gap:10px}
  .modal{max-height:90vh}
  .cat-desc{display:none}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">

/* ══════════════════════════════════════════
   STATE & RENDER
   ══════════════════════════════════════════ */
let activeCat = "ALL";

const $tabs = document.getElementById("tabs");
const $content = document.getElementById("content");
const $overlay = document.getElementById("overlay");
const $modal = document.getElementById("modal");

// ── Tabs ──
function renderTabs(){
  const tabDefs = [
    {key:"ALL", label:"전체"},
    {key:"FM", label:"FM 시설관리"},
    {key:"AD", label:"행정관리"},
    {key:"HR", label:"인적관리"},
    {key:"LM", label:"LM 수익률"},
    {key:"PM", label:"PM 자산관리"},
  ];
  $tabs.innerHTML = tabDefs.map(t =>
    `<button class="tab${activeCat===t.key?' active':''}" data-cat="${t.key}">${t.label}</button>`
  ).join("");
  $tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { activeCat = btn.dataset.cat; renderTabs(); renderContent(); });
  });
}

// ── Card HTML ──
function cardHTML(s){
  return `<div class="card" data-c="${s.cat}" data-id="${s.id}">
    <div class="card-top">
      <div class="card-left">
        <div class="card-icon" data-c="${s.cat}">${s.icon}</div>
        <div>
          <div class="card-name">${s.title}</div>
          <div class="card-sub">${s.sub}</div>
        </div>
      </div>
      <span class="card-arrow" data-c="${s.cat}">→</span>
    </div>
    <div class="card-desc">${s.desc}</div>
  </div>`;
}

// ── Content ──
function renderContent(){
  let html = "";
  if(activeCat === "ALL"){
    for(const [ck, cv] of Object.entries(CATS)){
      const items = SERVICES.filter(s => s.cat === ck);
      html += `<div class="cat-section">
        <div class="cat-header">
          <div class="cat-bar" data-c="${ck}"></div>
          <span class="cat-title">${cv.label}</span>
          <span class="cat-desc">${cv.desc}</span>
        </div>
        <div class="grid">${items.map(cardHTML).join("")}</div>
      </div>`;
    }
  } else {
    const items = SERVICES.filter(s => s.cat === activeCat);
    html = `<div class="grid">${items.map(cardHTML).join("")}</div>`;
  }
  $content.innerHTML = html;

  // Bind clicks
  $content.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => openModal(+card.dataset.id));
  });
}

// ── Modal ──
function openModal(id){
  const s = SERVICES.find(x => x.id === id);
  if(!s) return;
  const c = s.cat;
  $modal.innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-badge" data-c="${c}">${CATS[c].label}</div>
        <div class="modal-title">${s.icon} ${s.title}</div>
        <div class="modal-desc">${s.desc}</div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      ${s.details.map((d,i) => `
        <div class="detail-section">
          <div class="detail-head">
            <div class="detail-num" data-c="${c}">${i+1}</div>
            <div class="detail-heading">${d.h}</div>
          </div>
          ${d.items.map(it => `
            <div class="detail-item">
              <span class="dot" data-c="${c}">●</span>
              <span>${it}</span>
            </div>
          `).join("")}
        </div>
      `).join("")}
      <div class="price-placeholder">
        <p>💡 가격 정보는 추후 업데이트 예정입니다</p>
        <p class="sub">상담 문의: 1577-9489</p>
      </div>
    </div>
  `;
  $overlay.classList.add("open");
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.body.style.overflow = "hidden";
}

function closeModal(){
  $overlay.classList.remove("open");
  document.body.style.overflow = "";
}

$overlay.addEventListener("click", e => { if(e.target === $overlay) closeModal(); });
document.addEventListener("keydown", e => { if(e.key === "Escape") closeModal(); });

// ── Init ──
renderTabs();
renderContent();
</script>
