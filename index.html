<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>둥지 · 서비스 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f4f8;
  color: #1a1a1a;
}

:root {
  --brand: #3B8CE4;
  --brand-dark: #1a6cc7;
  --brand-light: #EBF3FD;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
}

/* ===== LOGIN OVERLAY ===== */
#login-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a3a5c 0%, #0f2640 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 36px 32px;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-logo { text-align: center; margin-bottom: 24px; }
.login-logo-text { font-size: 22px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
.login-logo-sub  { font-size: 12px; color: #999; margin-top: 4px; }
.login-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; display: block; }
.login-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 12px;
  transition: border-color .15s;
}
.login-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59,140,228,.1); }
.login-btn {
  width: 100%;
  padding: 11px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  transition: background .12s;
}
.login-btn:hover { background: var(--brand-dark); }
.login-error { font-size: 12px; color: #dc2626; text-align: center; margin-top: 8px; min-height: 18px; }

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #1a3a5c 0%, #0f2640 100%);
  color: #fff;
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.header-brand span { font-weight: 300; opacity: .7; font-size: 13px; margin-left: 8px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 13px; opacity: .8; }
.logout-btn {
  padding: 6px 12px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background .12s;
}
.logout-btn:hover { background: rgba(255,255,255,.22); }

/* ===== MAIN ===== */
.main { max-width: 960px; margin: 0 auto; padding: 36px 24px 60px; }

.page-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.page-sub   { font-size: 14px; color: #888; margin-bottom: 32px; }

/* ===== SECTION ===== */
.section { margin-bottom: 40px; }
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

/* ===== APP GRID ===== */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

/* ===== APP CARD ===== */
.app-card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: var(--radius);
  padding: 22px 20px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color .15s, box-shadow .15s, transform .12s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.app-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, #3B8CE4);
  opacity: 0;
  transition: opacity .15s;
}
.app-card:hover {
  border-color: var(--card-color, #3B8CE4);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}
.app-card:hover::before { opacity: 1; }

.app-card-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  background: var(--card-bg, #EBF3FD);
  flex-shrink: 0;
}
.app-card-icon i { font-size: 22px; color: var(--card-color, #3B8CE4); }

.app-card-body { flex: 1; }
.app-card-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.app-card-desc { font-size: 12px; color: #888; line-height: 1.5; }
.app-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.app-card-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  background: var(--card-bg, #EBF3FD);
  color: var(--card-color, #3B8CE4);
  border: 1px solid var(--card-border, #b3d3f5);
}
.app-card-arrow { color: #ccc; font-size: 16px; transition: color .12s, transform .12s; }
.app-card:hover .app-card-arrow { color: var(--card-color, #3B8CE4); transform: translateX(3px); }

/* NEW badge */
.badge-new {
  position: absolute;
  top: 12px; right: 12px;
  background: #3B8CE4;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 99px;
  letter-spacing: .04em;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: #bbb;
  border-top: 1px solid #e5e7eb;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .main { padding: 24px 16px 40px; }
  .app-grid { grid-template-columns: 1fr; }
  .header { padding: 0 16px; }
}
</style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-text">🏢 둥지</div>
      <div class="login-logo-sub">서비스 플랫폼 · 임직원 전용</div>
    </div>
    <label class="login-label">아이디</label>
    <input class="login-input" id="login-id" type="text" placeholder="아이디를 입력하세요" autocomplete="username">
    <label class="login-label">비밀번호</label>
    <input class="login-input" id="login-pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-brand">둥지 <span>Doongji · 서비스 플랫폼</span></div>
  <div class="header-right">
    <span class="header-user" id="header-user"></span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="page-title">안녕하세요 👋</div>
  <div class="page-sub">둥지 서비스 플랫폼에 오신 것을 환영합니다. 아래에서 필요한 도구를 선택하세요.</div>

  <!-- 영업 도구 -->
  <div class="section">
    <div class="section-label">영업 도구</div>
    <div class="app-grid">

      <!-- 서비스 메뉴판 & 견적서 -->
      <a class="app-card" href="./menu/index.html"
         style="--card-color:#3B8CE4;--card-bg:#EBF3FD;--card-border:#b3d3f5">
        <div class="app-card-icon"><i class="ti ti-file-invoice"></i></div>
        <div class="app-card-body">
          <div class="app-card-name">서비스 메뉴판 & 견적서</div>
          <div class="app-card-desc">12개 서비스 라인업 확인 및 고객 맞춤 견적서 생성 · PDF 다운로드</div>
        </div>
        <div class="app-card-foot">
          <span class="app-card-badge">영업</span>
          <i class="ti ti-arrow-right app-card-arrow"></i>
        </div>
      </a>

      <!-- 고객관리 CRM ← NEW -->
      <a class="app-card" href="./crm.html"
         style="--card-color:#7c3aed;--card-bg:#faf5ff;--card-border:#ddd6fe">
        <span class="badge-new">NEW</span>
        <div class="app-card-icon"><i class="ti ti-address-book"></i></div>
        <div class="app-card-body">
          <div class="app-card-name">영업팀 고객관리 CRM</div>
          <div class="app-card-desc">임대인 정보 · 건물 관리 · 소통 기록 · 미팅 캘린더 · 주간 보고</div>
        </div>
        <div class="app-card-foot">
          <span class="app-card-badge" style="background:#faf5ff;color:#7c3aed;border-color:#ddd6fe">CRM</span>
          <i class="ti ti-arrow-right app-card-arrow"></i>
        </div>
      </a>

    </div>
  </div>

</div>

<div class="footer">© 2026 ㈜컨텍터스 · 둥지 &nbsp;|&nbsp; 1577-9489</div>

<script>
/* ===================== 로그인 =====================
   기존 사이트 아이디/비밀번호 방식 그대로 유지.
   실제 계정은 아래 ACCOUNTS 객체에서 관리하세요.
   Supabase Auth 연동 시 doLogin() 함수만 교체하면 됩니다.
================================================== */
const ACCOUNTS = {
  // 'id': { pw: '비밀번호', name: '표시이름', role: 'admin|staff' }
  'doongji':  { pw: 'doongji2026!', name: '둥지 관리자', role: 'admin'  },
  'sales':    { pw: 'sales2026',    name: '영업팀',       role: 'staff'  },
  'fm':       { pw: 'fm2026',       name: '시설관리팀',   role: 'staff'  },
};

function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-error');

  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    document.getElementById('login-pw').value = '';
    return;
  }

  err.textContent = '';
  sessionStorage.setItem('doongji_user', JSON.stringify({ id, name: acc.name, role: acc.role }));
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('header-user').textContent = acc.name;
}

function doLogout() {
  sessionStorage.removeItem('doongji_user');
  document.getElementById('login-id').value  = '';
  document.getElementById('login-pw').value  = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-overlay').style.display = 'flex';
}

// 엔터키 로그인
document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-id').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pw').focus();
});

// 세션 유지 확인
(function checkSession() {
  const user = sessionStorage.getItem('doongji_user');
  if (user) {
    const u = JSON.parse(user);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('header-user').textContent = u.name;
  }
})();
</script>
</body>
</html>
